<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位健康管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-field { width: 100%; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.6rem; font-size: 1rem; outline: none; transition: all 0.2s; background-color: white; }
        .input-field:focus { border-color: #4f46e5; ring: 2px ring-indigo-100; }
        .label-text { font-size: 0.75rem; font-weight: 700; color: #64748b; margin-left: 0.25rem; margin-bottom: 0.25rem; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-indigo-600 text-white p-6 shadow-lg mb-4 text-center sticky top-0 z-50">
        <h1 class="text-xl font-bold" id="currentDate">載入中...</h1>
        <div class="flex flex-wrap justify-center gap-2 mt-2">
            <div id="summaryWater" class="text-[10px] bg-white/20 px-2 py-1 rounded-full border border-white/30">💧 飲水: 0cc</div>
            <div id="summaryEx" class="text-[10px] bg-white/20 px-2 py-1 rounded-full border border-white/30">🏃 運動: 0分</div>
            <div id="summarySleep" class="text-[10px] bg-white/20 px-2 py-1 rounded-full border border-white/30">🌙 睡眠紀錄: 0筆</div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        
        <section class="grid grid-cols-2 gap-3">
            <div class="card p-4 border-t-4 border-orange-500 text-center">
                <p class="text-[11px] font-bold text-gray-400 mb-1">🏃 運動計時</p>
                <div id="exTimerDisplay" class="text-lg font-mono font-bold text-orange-600 mb-2">00:00:00</div>
                <button id="exStartBtn" onclick="toggleTimer('ex')" class="w-full bg-orange-500 text-white py-1.5 rounded-lg text-sm font-bold shadow-sm">開始</button>
                <button id="exStopBtn" onclick="stopTimer('ex')" class="w-full bg-red-500 text-white py-1.5 rounded-lg text-sm font-bold shadow-sm hidden">結束</button>
            </div>
            <div class="card p-4 border-t-4 border-indigo-500 text-center">
                <p class="text-[11px] font-bold text-gray-400 mb-1">🌙 睡眠計時</p>
                <div id="sleepTimerDisplay" class="text-lg font-mono font-bold text-indigo-600 mb-2">00:00:00</div>
                <button id="sleepStartBtn" onclick="toggleTimer('sleep')" class="w-full bg-indigo-500 text-white py-1.5 rounded-lg text-sm font-bold shadow-sm">睡覺</button>
                <button id="sleepStopBtn" onclick="stopTimer('sleep')" class="w-full bg-indigo-900 text-white py-1.5 rounded-lg text-sm font-bold shadow-sm hidden">醒來</button>
            </div>
        </section>

        <section id="recordForm" class="card p-5 border-l-4 border-indigo-500">
            <h2 class="text-sm font-bold mb-4 text-indigo-700">📝 健康紀錄表單</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">記錄時間</label>
                        <input type="time" id="inputTime" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">項目分類</label>
                        <select id="inputCategory" onchange="checkCategory()" class="input-field">
                            <option value="飲食">🍎 飲食</option>
                            <option value="吃藥">💊 吃藥</option>
                            <option value="運動">🏃 運動</option>
                            <option value="睡眠">🌙 睡眠</option>
                            <option value="飲水">💧 飲水</option>
                            <option value="排便">💩 排便</option>
                            <option value="看診">🏥 看診</option>
                            <option value="其他">✨ 其他</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label id="contentLabel" class="label-text">食物與藥物 / 活動內容</label>
                    <input type="text" id="inputContent" placeholder="請輸入內容..." class="input-field">
                </div>
                
                <div id="extraField" class="hidden">
                    <label class="label-text">持續時長</label>
                    <input type="text" id="inputDuration" placeholder="例如: 60分鐘 或 8小時" class="input-field border-orange-200">
                </div>

                <div>
                    <label class="label-text">身體症狀與感受</label>
                    <textarea id="inputSymptoms" rows="2" placeholder="紀錄當下的不適或感覺..." class="input-field text-sm"></textarea>
                </div>
                
                <div>
                    <label class="label-text">藥單明細 / 診斷內容</label>
                    <textarea id="inputMedDetail" rows="2" placeholder="看診開藥或詳細醫囑..." class="input-field text-sm bg-blue-50/30"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">體重 (kg)</label>
                        <input type="number" id="baseWeight" step="0.1" placeholder="選填" class="input-field text-sm">
                    </div>
                    <div>
                        <label class="label-text">體溫 (°C)</label>
                        <input type="number" id="baseTemp" step="0.1" placeholder="選填" class="input-field text-sm">
                    </div>
                </div>
                
                <button onclick="saveData()" id="saveBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg active:bg-indigo-700 transition-all">
                    儲存紀錄
                </button>
            </div>
        </section>

        <section class="flex gap-2">
            <input type="month" id="searchMonth" onchange="renderList('month')" class="flex-1 p-2 rounded-xl border bg-white text-sm font-medium">
            <button onclick="exportExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold">匯出完整報告</button>
        </section>

        <section class="card p-4">
            <div class="flex bg-gray-100 rounded-xl p-1 mb-4 text-[10px] font-bold">
                <button onclick="renderList('day')" class="flex-1 py-2 rounded-lg transition-all" id="btn-day">當日</button>
                <button onclick="renderList('week')" class="flex-1 py-2 rounded-lg transition-all" id="btn-week">當周</button>
                <button onclick="renderList('month')" class="flex-1 py-2 rounded-lg transition-all" id="btn-month">月查詢</button>
            </div>
            <div id="dataList" class="space-y-3 min-h-[200px]"></div>
        </section>
    </main>

    <script>
        let records = JSON.parse(localStorage.getItem('healthFinal_v7')) || [];
        let timers = { ex: { start: null, interval: null }, sleep: { start: null, interval: null } };

        function init() {
            const now = new Date();
            document.getElementById('currentDate').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('inputTime').value = now.toTimeString().slice(0,5);
            document.getElementById('searchMonth').value = now.toISOString().slice(0, 7);
            
            ['ex', 'sleep'].forEach(type => {
                const saved = localStorage.getItem(`${type}_startTime_v7`);
                if (saved) { timers[type].start = parseInt(saved); resumeTimerUI(type); }
            });
            updateSummary();
            renderList('day');
            checkCategory();
        }

        // 計時器邏輯
        function toggleTimer(type) {
            timers[type].start = Date.now();
            localStorage.setItem(`${type}_startTime_v7`, timers[type].start);
            resumeTimerUI(type);
        }

        function resumeTimerUI(type) {
            document.getElementById(`${type}StartBtn`).classList.add('hidden');
            document.getElementById(`${type}StopBtn`).classList.remove('hidden');
            timers[type].interval = setInterval(() => {
                const diff = Date.now() - timers[type].start;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById(`${type}TimerDisplay`).innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function stopTimer(type) {
            clearInterval(timers[type].interval);
            const durationMs = Date.now() - timers[type].start;
            const hours = Math.floor(durationMs / 3600000);
            const mins = Math.round((durationMs % 3600000) / 60000);
            const startStr = new Date(timers[type].start).toTimeString().slice(0,5);
            const endStr = new Date().toTimeString().slice(0,5);

            document.getElementById('inputCategory').value = (type === 'ex') ? '運動' : '睡眠';
            document.getElementById('inputDuration').value = (type === 'ex') ? mins : `${hours}時${mins}分`;
            document.getElementById('inputSymptoms').value = `時段：${startStr} - ${endStr}`;
            
            checkCategory();
            localStorage.removeItem(`${type}_startTime_v7`);
            document.getElementById(`${type}StartBtn`).classList.remove('hidden');
            document.getElementById(`${type}StopBtn`).classList.add('hidden');
            document.getElementById(`${type}TimerDisplay`).innerText = "00:00:00";
            document.getElementById('recordForm').scrollIntoView({ behavior: 'smooth' });
        }

        function checkCategory() {
            const cat = document.getElementById('inputCategory').value;
            const label = document.getElementById('contentLabel');
            const extra = document.getElementById('extraField');
            
            extra.classList.toggle('hidden', !['運動', '睡眠'].includes(cat));
            
            if(['飲食', '吃藥', '飲水'].includes(cat)) {
                label.innerText = "食物與藥物名稱";
            } else if(cat === '看診') {
                label.innerText = "就醫診所名稱";
            } else {
                label.innerText = "活動項目 / 內容";
            }
        }

        function saveData() {
            const cat = document.getElementById('inputCategory').value;
            const content = document.getElementById('inputContent').value;
            const symptoms = document.getElementById('inputSymptoms').value;
            const medDetail = document.getElementById('inputMedDetail').value;
            
            if(!content && !symptoms && !medDetail) return alert('請至少填寫一項內容！');

            // 邏輯拆分：將內容根據類別存入對應欄位
            let foodAndDrug = "";
            let activityMemo = "";

            if(['飲食', '吃藥', '飲水'].includes(cat)) {
                foodAndDrug = content;
            } else {
                activityMemo = content;
            }

            const now = new Date();
            const record = {
                id: Date.now(),
                date: now.toLocaleDateString('en-CA'),
                time: document.getElementById('inputTime').value,
                timestamp: now.getTime(),
                category: cat,
                foodAndDrug: foodAndDrug,           // 食物與藥物
                symptoms: symptoms,                 // 身體症狀與感受
                activityMemo: activityMemo,         // 活動/備註 (含診所名)
                duration: document.getElementById('inputDuration').value,
                medDetail: medDetail,               // 藥單明細
                weight: document.getElementById('baseWeight').value,
                temp: document.getElementById('baseTemp').value
            };

            records.unshift(record);
            localStorage.setItem('healthFinal_v7', JSON.stringify(records));
            
            // 重置
            ['inputContent', 'inputDuration', 'inputSymptoms', 'inputMedDetail', 'baseWeight', 'baseTemp'].forEach(id => document.getElementById(id).value = '');
            const btn = document.getElementById('saveBtn');
            btn.innerText = '✅ 儲存成功';
            setTimeout(() => { btn.innerText = '儲存紀錄'; }, 1000);
            updateSummary();
            renderList('day');
        }

        function updateSummary() {
            const today = new Date().toLocaleDateString('en-CA');
            const todayRecs = records.filter(r => r.date === today);
            const water = todayRecs.filter(r => r.category === '飲水').reduce((s, r) => s + (parseInt(r.foodAndDrug) || 0), 0);
            const ex = todayRecs.filter(r => r.category === '運動').reduce((s, r) => s + (parseInt(r.duration) || 0), 0);
            document.getElementById('summaryWater').innerText = `💧 飲水: ${water}cc`;
            document.getElementById('summaryEx').innerText = `🏃 運動: ${ex}分`;
        }

        function renderList(view) {
            const container = document.getElementById('dataList');
            const now = new Date();
            let filtered = [];

            if (view === 'day') filtered = records.filter(r => r.date === now.toLocaleDateString('en-CA'));
            else if (view === 'week') filtered = records.filter(r => r.timestamp >= now.getTime() - 604800000);
            else if (view === 'month') filtered = records.filter(r => r.date.startsWith(document.getElementById('searchMonth').value));

            container.innerHTML = filtered.map(r => `
                <div class="p-4 card border border-gray-100 relative ${r.category === '看診' ? 'bg-blue-50/30' : ''}">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-bold text-indigo-400">${r.date} ${r.time}</span>
                        <button onclick="deleteRecord(${r.id})" class="text-gray-300 text-xs">刪除</button>
                    </div>
                    <div class="text-sm">
                        <span class="font-bold text-gray-800">${r.category}</span>
                        <span class="ml-1 text-gray-600">${r.foodAndDrug || r.activityMemo}</span>
                        ${r.duration ? `<span class="text-orange-600 font-bold text-xs ml-1">[${r.duration}]</span>` : ''}
                    </div>
                    <div class="mt-2 space-y-1">
                        ${r.symptoms ? `<div class="text-[11px] text-gray-500 italic bg-gray-50 p-1.5 rounded">感受：${r.symptoms}</div>` : ''}
                        ${r.medDetail ? `<div class="text-[11px] text-blue-600 bg-blue-50 p-1.5 rounded">藥單：${r.medDetail}</div>` : ''}
                    </div>
                </div>
            `).join('') || '<div class="text-center text-gray-300 py-10">尚無紀錄</div>';
        }

        function deleteRecord(id) { if(confirm('確定刪除？')) { records = records.filter(r => r.id !== id); localStorage.setItem('healthFinal_v7', JSON.stringify(records)); updateSummary(); renderList('day'); } }

        function exportExcel() {
            try {
                const month = document.getElementById('searchMonth').value;
                const filtered = records.filter(r => r.date.startsWith(month));
                if(!filtered.length) return alert('無資料可以匯出');

                const exportData = filtered.map(r => ({
                    '日期': r.date,
                    '時間': r.time,
                    '項目分類': r.category,
                    '食物與藥物': r.foodAndDrug,
                    '身體症狀與感受': r.symptoms,
                    '活動/備註(含時長/診所)': `${r.activityMemo} ${r.duration ? '('+r.duration+')' : ''}`.trim(),
                    '藥單明細': r.medDetail,
                    '體重': r.weight,
                    '體溫': r.temp
                }));

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(exportData);
                ws['!cols'] = [{wch:12}, {wch:8}, {wch:10}, {wch:25}, {wch:30}, {wch:30}, {wch:30}, {wch:8}, {wch:8}];
                XLSX.utils.book_append_sheet(wb, ws, "健康完整報告");
                XLSX.writeFile(wb, `健康管理報告_${month}.xlsx`);
            } catch (e) { alert('匯出失敗，請再試一次'); }
        }

        window.onload = init;
    </script>
</body>
</html>
